name: Upgrade hashes, 3D doc, CBOR, COSE snapshots (fstar2)
on:
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create a pull request (if unchecked, push directly to branch)'
        type: boolean
        default: true
  schedule:
    - cron: "0 22 * * 0,3"

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write

jobs:
  advance-hashes:
    runs-on: Ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          ref: ${{ github.event_name == 'schedule' && 'fstar2' || '' }}
      - name: Record base ref
        run: |
          echo "base_branch=${{ github.event_name == 'schedule' && 'fstar2' || github.ref_name }}" > base_ref.txt
          echo "base_sha=$(git rev-parse HEAD)" >> base_ref.txt
      - name: Set up git
        run: |
          git config --global user.name "Dzomo, the Everest Yak"
          git config --global user.email "24394600+dzomo@users.noreply.github.com"
      - name: Install opam
        run: |
          sudo apt-get update && sudo apt-get install --yes --no-install-recommends opam
      - name: Advance hashes
        run: |
          make -C opt -j$(nproc) advance &&
          if ! git diff --exit-code -- opt/hashes.Makefile ; then git add -u opt/hashes.Makefile && git commit -m 'Update hashes' ; fi &&
          git diff --exit-code
      - name: Generate CBOR .krml files
        run: |
          make ADMIT=1 cbor-extract-krml -kj$(nproc)
      - name: Generate CBOR snapshot with Karamel
        run: |
          make ADMIT=1 cbor-snapshot -Otarget -kj$(nproc) && make ADMIT=1 cbor -kj$(nproc)
      - name: Generate COSE .krml files
        run: |
          make ADMIT=1 cose-extract-krml -kj$(nproc)
      - name: Generate COSE snapshot with Karamel
        run: |
          make ADMIT=1 cose-snapshot -Otarget -kj$(nproc) && make ADMIT=1 cose -kj$(nproc)
      - name: Stage in new snapshots
        run: |
          git add src/cbor/pulse/det/c src/cbor/pulse/nondet/c src/cbor/pulse/det/rust src/cose/c src/cose/rust &&
          if ! git diff --staged --exit-code ; then git commit -m "3D doc, CBOR, COSE snapshot" ; fi &&
          git diff --exit-code
      - name: Push new branch
        run: |
          git checkout -b _dzomo_upgrade_${{ github.run_id }} &&
          git push origin _dzomo_upgrade_${{ github.run_id }} &&
          git rev-parse HEAD > hash.txt
      - name: Upload hash
        uses: actions/upload-artifact@v4
        with:
          path: |
            hash.txt
            base_ref.txt
          name: hash

  ci-linux:
    needs: advance-hashes
    runs-on: ubuntu-latest
    steps:
      - name: Download hash
        uses: actions/download-artifact@v4
        with:
          name: hash
      - name: Read hash
        run: |
          hash="$(cat hash.txt)"
          echo "hash=$hash" >> $GITHUB_ENV
      - uses: actions/checkout@master
        with:
          submodules: true
          ref: ${{ env.hash }}
          path: everparse
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5
      - name: Everparse CI
        run: |
          make -C everparse -j$(nproc) -k test

  ci-macos:
    needs: advance-hashes
    runs-on: macOS-latest
    steps:
      - name: Download hash
        uses: actions/download-artifact@v4
        with:
          name: hash
      - name: Read hash
        run: |
          hash="$(cat hash.txt)"
          echo "hash=$hash" >> $GITHUB_ENV
      - uses: actions/checkout@master
        with:
          submodules: true
          ref: ${{ env.hash }}
          path: everparse
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5
      - name: Install Homebrew tools
        run: |
          brew install bash gnu-getopt make gnu-time
      - name: Test
        run: |
          nproc=$(sysctl -n hw.logicalcpu)
          if [[ $nproc -gt 8 ]] ; then nproc=8 ; fi
          cd everparse && gmake -j$nproc -k all test

  ci-docker:
    needs: advance-hashes
    runs-on: ubuntu-latest
    steps:
      - name: Download hash
        uses: actions/download-artifact@v4
        with:
          name: hash
      - name: Read hash
        run: |
          hash="$(cat hash.txt)"
          echo "hash=$hash" >> $GITHUB_ENV
      - uses: actions/checkout@master
        with:
          submodules: true
          ref: ${{ env.hash }}
          path: everparse
      - name: Havoc .depend
        run: |
          echo '$(error "This file should have been cleaned away")' > everparse/.depend
      - name: Get number of processors
        run: |
          echo CI_THREADS=$(nproc) >> $GITHUB_ENV
      - name: Build a Docker image
        uses: docker/build-push-action@v6
        with:
          build-args: |
            CI_THREADS=${{ env.CI_THREADS }}
          context: everparse

  create-pr:
    needs: [ci-linux, ci-macos, ci-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download hash
        uses: actions/download-artifact@v4
        with:
          name: hash
      - name: Record hash and remove hash file
        run: |
          echo "updated_sha=$(cat hash.txt)" >> $GITHUB_ENV && rm hash.txt
          source base_ref.txt
          echo "base_branch=$base_branch" >> $GITHUB_ENV
          echo "base_sha=$base_sha" >> $GITHUB_ENV
          rm base_ref.txt
      - uses: actions/checkout@master
        with:
          submodules: true
          fetch-depth: 0
          ref: ${{ env.updated_sha }}
      - name: create pull request
        if: (github.event_name == 'schedule' && env.base_branch == 'master') || (github.event_name == 'workflow_dispatch' && inputs.create_pr)
        run: |
          if [[ "$updated_sha" != "$base_sha" ]] ; then git checkout -b _dzomo_pr_${{ github.run_id }} && git push --set-upstream origin _dzomo_pr_${{ github.run_id }} && gh pr create --base "$base_branch" --title "Update hashes and snapshots" --fill-verbose ; fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Push to branch directly
        if: (github.event_name == 'schedule' && env.base_branch != 'master') || (github.event_name == 'workflow_dispatch' && !inputs.create_pr)
        run: |
          if [[ "$updated_sha" != "$base_sha" ]] ; then git push origin HEAD:"$base_branch" ; fi
      - name: Delete branch
        run: |
          if [[ "$(git rev-parse origin/_dzomo_upgrade_${{ github.run_id }})" = "$updated_sha" ]] ; then git push origin --delete _dzomo_upgrade_${{ github.run_id }} ; fi

  deps:
    runs-on: ubuntu-latest
    needs: create-pr
    steps:
      - name: Download hash
        uses: actions/download-artifact@v4
        with:
          name: hash
      - name: Record hash and remove hash file
        run: |
          echo "updated_sha=$(cat hash.txt)" >> $GITHUB_ENV && rm hash.txt
      - uses: actions/checkout@master
        with:
          submodules: true
          ref: ${{ env.updated_sha }}
          sparse-checkout: |
            Dockerfile
            deps.Makefile
            opt/Makefile
            opt/hashes.Makefile
            src/package/start-code-server.sh
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: deps.tgz
          key: dzomoeverparsedeps${{ hashFiles('opt/hashes.Makefile') }}
          lookup-only: true
          fail-on-cache-miss: false
      - name: Build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          rm -rf .git && docker build -t dzomoeverparsedeps${{ hashFiles('opt/hashes.Makefile') }} --pull --target deps .
      - name: Save image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker save dzomoeverparsedeps${{ hashFiles('opt/hashes.Makefile') }} | gzip > deps.tgz
      - name: Upload image into cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            deps.tgz
          key: dzomoeverparsedeps${{ hashFiles('opt/hashes.Makefile') }}
